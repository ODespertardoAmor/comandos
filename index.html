<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rota Brasil</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url('assets/fundo.jpg');
background-size:cover;
background-position:center;
color:white;
}

header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
background:#111827;
}

.logo{
font-size:28px;
font-weight:bold;
}

.container{
width:100%;
min-height:90vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.card{
width:100%;
max-width:450px;
background:rgba(31,41,55,0.9);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
}

h1{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#374151;
color:white;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#10b981;
color:white;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}

.register{
background:#2563eb;
}

.dashboard{
display:none;
}

.motorista{
background:#374151;
padding:15px;
border-radius:12px;
margin-top:10px;
}

.status{
text-align:center;
margin-top:15px;
}

.mapa{
width:100%;
height:250px;
background:#1f2937;
border-radius:15px;
margin-top:20px;
display:flex;
align-items:center;
justify-content:center;
}

</style>

</head>
<body>

<header>
<div class="logo">
🚗 Rota Brasil
</div>
</header>

<div class="container">

<!-- LOGIN -->

<div class="card" id="loginCard">

<h1>Passageiro</h1>

<input
type="email"
id="email"
placeholder="Seu email"
>

<input
type="password"
id="senha"
placeholder="Sua senha"
>

<button onclick="login()">
Entrar
</button>

<button
class="register"
onclick="register()"
>
Criar Conta
</button>

<p class="status" id="loginStatus"></p>

</div>

<!-- DASHBOARD -->

<div class="card dashboard" id="dashboard">

<h1>Chamar Corrida</h1>

<input
id="origem"
placeholder="Origem"
>

<input
id="destino"
placeholder="Destino"
>

<button onclick="buscarMotoristas()">
Procurar Motoristas
</button>

<div id="motoristasArea">
Nenhum motorista online
</div>

<button onclick="chamarCorrida()">
Chamar Corrida
</button>

<div class="mapa">
MAPA TEMPO REAL
</div>

<p class="status" id="corridaStatus"></p>

</div>

</div>

<script>

const API =
"https://rotabrasil-v1cf.onrender.com"

const socket = io(API)

let user = null

// REGISTER

async function register(){

const email =
document.getElementById("email").value

const senha =
document.getElementById("senha").value

const status =
document.getElementById("loginStatus")

try{

const response = await fetch(

API + "/register",

{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
nome:"Passageiro",
email,
senha,
telefone:"99999",
tipo:"passageiro"
})
}
)

const text = await response.text()

console.log(text)

status.innerHTML =
"Conta criada com sucesso"

}catch(error){

console.log(error)

status.innerHTML =
"Erro cadastro"
}
}

// LOGIN

async function login(){

const email =
document.getElementById("email").value

const senha =
document.getElementById("senha").value

const status =
document.getElementById("loginStatus")

try{

const response = await fetch(

API + "/login",

{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
senha
})
}
)

const data = await response.json()

console.log(data)

if(data.token){

user = data.user

localStorage.setItem(
"token",
data.token
)

localStorage.setItem(
"user",
JSON.stringify(data.user)
)

document.getElementById(
"loginCard"
).style.display = "none"

document.getElementById(
"dashboard"
).style.display = "block"

buscarMotoristas()

}else{

status.innerHTML =
data.erro || "Erro login"
}

}catch(error){

console.log(error)

status.innerHTML =
"Erro servidor"
}
}

// MOTORISTAS ONLINE

async function buscarMotoristas(){

const area =
document.getElementById(
"motoristasArea"
)

area.innerHTML =
"Buscando motoristas..."

try{

const response = await fetch(
API + "/motoristas_online"
)

const data = await response.json()

console.log(data)

area.innerHTML = ""

if(data.length === 0){

area.innerHTML =
"Nenhum motorista online"

return
}

data.forEach((motorista)=>{

area.innerHTML += `

<div class="motorista">
🚗 ${motorista.nome}<br>
Carro: ${motorista.carro || 'Não informado'}
</div>
`
})

}catch(error){

console.log(error)

area.innerHTML =
"Erro ao buscar motoristas"
}
}

// NOVA CORRIDA

async function chamarCorrida(){

const origem =
document.getElementById("origem").value

const destino =
document.getElementById("destino").value

const status =
document.getElementById("corridaStatus")

try{

const response = await fetch(

API + "/nova_corrida",

{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
passageiro_id:user.id,
origem,
destino,
valor:25
})
}
)

const data = await response.json()

console.log(data)

status.innerHTML =
"Corrida chamada com sucesso 🚗"

}catch(error){

console.log(error)

status.innerHTML =
"Erro ao chamar corrida"
}
}

// SOCKET

socket.on(
"corrida_aceita",
(data)=>{

const status =
document.getElementById(
"corridaStatus"
)

status.innerHTML =
"Motorista aceitou sua corrida 🚗"

}
)

</script>

</body>
</html>
