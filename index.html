<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Passageiro - Rota Brasil</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
padding:20px;
background:#111827;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

input{
width:100%;
padding:15px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:#111827;
color:white;
outline:none;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:0.2s;
font-size:16px;
}

button:hover{
transform:scale(1.02);
}

.primary{
background:#2563eb;
color:white;
}

.success{
background:#10b981;
color:white;
}

.danger{
background:#ef4444;
color:white;
}

.status{
text-align:center;
margin-top:15px;
font-weight:bold;
}

.motorista{
background:#111827;
padding:12px;
border-radius:12px;
margin-top:10px;
border:1px solid #374151;
}

.badge{
display:inline-block;
padding:5px 10px;
background:#22c55e;
border-radius:10px;
font-size:12px;
margin-bottom:10px;
}

#mapaMotorista{
margin-top:15px;
}

</style>

</head>

<body>

<header>
🚗 Rota Brasil Passageiro
</header>

<div class="container">

<!-- LOGIN -->

<div class="card" id="loginCard">

<h3>Login / Cadastro</h3>

<input
id="nome"
placeholder="Nome">

<input
id="email"
placeholder="Email">

<input
id="senha"
type="password"
placeholder="Senha">

<input
id="telefone"
placeholder="Telefone">

<button
class="primary"
onclick="register()">

Criar conta

</button>

<button
class="success"
onclick="login()">

Entrar

</button>

<p
id="loginStatus"
class="status"></p>

</div>

<!-- DASHBOARD -->

<div
class="card"
id="dashboard"
style="display:none">

<h3>Chamar corrida</h3>

<input
id="origem"
placeholder="Origem">

<input
id="destino"
placeholder="Destino">

<button
class="primary"
onclick="chamarCorrida()">

Procurar motorista

</button>

<button
class="danger"
onclick="cancelarCorrida()">

Cancelar corrida

</button>

<hr>

<div class="badge">
Motoristas online
</div>

<div id="motoristasArea">
Nenhum motorista online
</div>

<p
id="corridaStatus"
class="status"></p>

<div id="mapaMotorista"></div>

</div>

</div>

<script>

const API =
"https://rotabrasil-v1cf.onrender.com";

const socket = io(API);

let user = null;

let corridaId = null;

let motoristaAtual = null;

let motoristaInfo = null;

/* REGISTER */

async function register(){

await fetch(
API+"/register",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

nome:
document.getElementById(
"nome"
).value,

email:
document.getElementById(
"email"
).value,

senha:
document.getElementById(
"senha"
).value,

telefone:
document.getElementById(
"telefone"
).value,

tipo:"passageiro"

})

}
);

document.getElementById(
"loginStatus"
).innerText =
"Conta criada ✔";

}

/* LOGIN */

async function login(){

const res = await fetch(
API+"/login",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:
document.getElementById(
"email"
).value,

senha:
document.getElementById(
"senha"
).value

})

}
);

const data =
await res.json();

if(data.token){

user = data.user;

localStorage.setItem(
"token",
data.token
);

localStorage.setItem(
"user",
JSON.stringify(user)
);

document.getElementById(
"loginCard"
).style.display =
"none";

document.getElementById(
"dashboard"
).style.display =
"block";

buscarMotoristas();

}else{

alert("Erro login");

}

}

/* MOTORISTAS */

async function buscarMotoristas(){

const res =
await fetch(
API+"/motoristas_online"
);

const data =
await res.json();

const area =
document.getElementById(
"motoristasArea"
);

area.innerHTML = "";

if(data.length === 0){

area.innerHTML =
"Nenhum motorista online";

return;

}

data.forEach((m)=>{

area.innerHTML += `

<div class="motorista">

🚗 ${m.nome}

<br>

${m.carro || ""}

</div>

`;

});

}

/* CHAMAR CORRIDA */

async function chamarCorrida(){

const res = await fetch(
API+"/nova_corrida",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

passageiro_id:user.id,

origem:
document.getElementById(
"origem"
).value,

destino:
document.getElementById(
"destino"
).value,

valor:25

})

}
);

const data =
await res.json();

corridaId =
data.corrida_id;

document.getElementById(
"corridaStatus"
).innerHTML =
"🚗 Procurando motorista...";

}

/* CANCELAR */

async function cancelarCorrida(){

if(!corridaId) return;

await fetch(
API+"/cancelar_corrida/"+corridaId,
{
method:"POST"
}
);

document.getElementById(
"corridaStatus"
).innerHTML =
"❌ Corrida cancelada";

document.getElementById(
"mapaMotorista"
).innerHTML = "";

corridaId = null;

}

/* CORRIDA ACEITA */

socket.on(
"corrida_aceita",
(data)=>{

console.log(
"CORRIDA ACEITA",
data
);

motoristaAtual =
data.motorista_id;

motoristaInfo = data;

document.getElementById(
"corridaStatus"
).innerHTML = `

<div style="
background:#111827;
padding:20px;
border-radius:15px;
">

<h2 style="
color:#22c55e;
">

🚗 Corrida aceita

</h2>

<p>
👨 Motorista:
${data.motorista_nome}
</p>

<p>
🚘 Carro:
${data.carro}
</p>

<p>
📍 Placa:
${data.placa}
</p>

</div>

`;

document.getElementById(
"mapaMotorista"
).innerHTML = `

<div style="
background:#111827;
padding:20px;
border-radius:15px;
text-align:center;
">

🗺️ Aguardando localização do motorista...

</div>

`;

}
);

/* GPS TEMPO REAL */



/* CANCELAMENTO */

socket.on(
"corrida_cancelada",
(data)=>{

document.getElementById(
"corridaStatus"
).innerHTML = `

<div style="
background:#111827;
padding:20px;
border-radius:15px;
text-align:center;
">

<h2 style="
color:#ef4444;
">

❌ Corrida cancelada

</h2>

</div>

`;

document.getElementById(
"mapaMotorista"
).innerHTML = "";

}
);

</script>

</body>
</html>
