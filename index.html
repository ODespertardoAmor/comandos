<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Passageiro</title>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background-image:

            linear-gradient(
                rgba(0,0,0,0.7),
                rgba(0,0,0,0.7)
            ),

            url("assets/fundo.jpg");

            background-size:cover;

            background-position:center;

            background-repeat:no-repeat;

            background-attachment:fixed;

            color:white;
        }

        .container{
            width:100%;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .card{

            width:100%;
            max-width:400px;

            background:rgba(31,41,55,0.88);

            backdrop-filter:blur(10px);

            padding:30px;

            border-radius:20px;

            box-shadow:0 0 25px rgba(0,0,0,0.6);
        }

        .logo{
            width:120px;
            display:block;
            margin:0 auto 20px;
        }

        h1{
            text-align:center;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:15px;
            margin-bottom:15px;
            border:none;
            border-radius:10px;
            background:#374151;
            color:white;
            font-size:16px;
        }

        input::placeholder{
            color:#d1d5db;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#10b981;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            opacity:0.9;
            transform:scale(1.02);
        }

        .status{
            text-align:center;
            margin-top:20px;
            color:#d1d5db;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="card">

            <img
                src="assets/logo.png"
                class="logo"
            >

            <h1>Passageiro</h1>

            <input
                type="text"
                id="origem"
                placeholder="Origem"
            >

            <input
                type="text"
                id="destino"
                placeholder="Destino"
            >

            <button onclick="chamarCorrida()">
                Chamar Corrida
            </button>

            <p
                class="status"
                id="status"
            ></p>

        </div>

    </div>

    <script>

        const API =
        "https://rotabrasil-v1cf.onrender.com"

        const socket = io(API)

        // =====================================
        // CHAMAR CORRIDA
        // =====================================

        async function chamarCorrida(){

            const origem =
            document.getElementById(
                "origem"
            ).value

            const destino =
            document.getElementById(
                "destino"
            ).value

            const status =
            document.getElementById(
                "status"
            )

            try{

                const response = await fetch(

                    API + "/nova_corrida",

                    {

                        method:"POST",

                        headers:{
                            "Content-Type":
                            "application/json"
                        },

                        body: JSON.stringify({

                            passageiro_id:1,

                            origem,

                            destino,

                            valor:25
                        })
                    }
                )

                const data =
                await response.json()

                console.log(data)

                status.innerHTML =
                "Corrida chamada com sucesso"

            }catch(error){

                console.log(error)

                status.innerHTML =
                "Erro ao chamar corrida"
            }
        }

    </script>

</body>

</html>
