<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Passageiro - Rota Brasil</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
padding:20px;
background:#111827;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

input{
width:100%;
padding:15px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:#111827;
color:white;
outline:none;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:0.2s;
font-size:16px;
}

button:hover{
transform:scale(1.02);
}

.primary{
background:#2563eb;
color:white;
}

.success{
background:#10b981;
color:white;
}

.danger{
background:#ef4444;
color:white;
}

.status{
text-align:center;
margin-top:15px;
font-weight:bold;
}

.motorista{
background:#111827;
padding:12px;
border-radius:12px;
margin-top:10px;
border:1px solid #374151;
}

.badge{
display:inline-block;
padding:5px 10px;
background:#22c55e;
border-radius:10px;
font-size:12px;
margin-bottom:10px;
}

#mapaMotorista{
margin-top:15px;
}

iframe{
width:100%;
height:300px;
border:none;
border-radius:15px;
}

</style>

</head>

<body>

<header>
🚗 Rota Brasil
</header>

<div class="container">

<div class="card" id="loginCard">

<h3>Login / Cadastro</h3>

<input
id="nome"
placeholder="Nome">

<input
id="email"
placeholder="Email">

<input
id="senha"
type="password"
placeholder="Senha">

<input
id="telefone"
placeholder="Telefone">

<button
class="primary"
onclick="register()">

Criar conta

</button>

<button
class="success"
onclick="login()">

Entrar

</button>

<p
id="loginStatus"
class="status"></p>

</div>

<div
class="card"
id="dashboard"
style="display:none">

<h3>
Para onde vamos?
</h3>

<input
id="destino"
placeholder="Digite o destino">

<button
class="primary"
onclick="chamarCorrida()">

Procurar motorista

</button>

<button
class="danger"
onclick="cancelarCorrida()">

Cancelar corrida

</button>

<hr>

<div class="badge">
Motoristas online
</div>

<div id="motoristasArea">
Nenhum motorista online
</div>

<p
id="corridaStatus"
class="status"></p>

<div id="mapaMotorista"></div>

</div>

</div>

<script>

const API =
"https://rotabrasil-v1cf.onrender.com";

const socket =
io(API);

let user = null;

let corridaId = null;

let motoristaAtual = null;

let motoristaInfo = null;

/* LOGIN AUTO */

const userSalvo =
localStorage.getItem("user");

if(userSalvo){

user =
JSON.parse(userSalvo);

document.addEventListener(
"DOMContentLoaded",
()=>{

document.getElementById(
"loginCard"
).style.display =
"none";

document.getElementById(
"dashboard"
).style.display =
"block";

buscarMotoristas();

}
);

}

/* REGISTER */

async function register(){

await fetch(
API+"/register",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

nome:
document.getElementById(
"nome"
).value,

email:
document.getElementById(
"email"
).value,

senha:
document.getElementById(
"senha"
).value,

telefone:
document.getElementById(
"telefone"
).value,

tipo:"passageiro"

})

}

);

document.getElementById(
"loginStatus"
).innerHTML =
"Conta criada ✔";

}

/* LOGIN */

async function login(){

const res =
await fetch(
API+"/login",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:
document.getElementById(
"email"
).value,

senha:
document.getElementById(
"senha"
).value

})

}

);

const data =
await res.json();

if(data.token){

user =
data.user;

localStorage.setItem(
"token",
data.token
);

localStorage.setItem(
"user",
JSON.stringify(user)
);

document.getElementById(
"loginCard"
).style.display =
"none";

document.getElementById(
"dashboard"
).style.display =
"block";

buscarMotoristas();

}else{

alert(
"Erro login"
);

}

}

/* MOTORISTAS */

async function buscarMotoristas(){

const res =
await fetch(
API+"/motoristas_online"
);

const data =
await res.json();

const area =
document.getElementById(
"motoristasArea"
);

area.innerHTML = "";

if(data.length === 0){

area.innerHTML =
"Nenhum motorista online";

return;

}

data.forEach((m)=>{

area.innerHTML += `

<div class="motorista">

🚗 ${m.nome}

<br>

${m.carro || ""}

</div>

`;

});

}

/* CALCULAR */

async function calcularCorrida(
origem,
destino
){

const API_KEY =
"SUA_API_KEY";

/* GEO */

async function buscarCoordenadas(local){

if(local.includes(",")){

const partes =
local.split(",");

return [

parseFloat(partes[1]),
parseFloat(partes[0])

];

}

const url =

`https://api.openrouteservice.org/geocode/search?api_key=${API_KEY}&text=${encodeURIComponent(local)}&boundary.country=BR`;

const res =
await fetch(url);

const data =
await res.json();

const coords =
data.features[0]
.geometry.coordinates;

return coords;

}

try{

const origemCoords =
await buscarCoordenadas(
origem
);

const destinoCoords =
await buscarCoordenadas(
destino
);

const rotaUrl =

`https://api.openrouteservice.org/v2/directions/driving-car?api_key=${API_KEY}&start=${origemCoords[0]},${origemCoords[1]}&end=${destinoCoords[0]},${destinoCoords[1]}`;

const rotaRes =
await fetch(rotaUrl);

const rotaData =
await rotaRes.json();

const metros =

rotaData.features[0]
.properties.summary.distance;

const km =
metros / 1000;

const valor =
km * 2;

return {

km: km.toFixed(1),

valor: valor.toFixed(2)

};

}catch(err){

console.log(err);

alert(
"Erro calcular rota"
);

return null;

}

}

/* CHAMAR */

async function chamarCorrida(){

if(!navigator.geolocation){

alert(
"GPS não suportado"
);

return;

}

navigator.geolocation.getCurrentPosition(

async(pos)=>{

try{

const latitude =
pos.coords.latitude;

const longitude =
pos.coords.longitude;

const origem =
`${latitude},${longitude}`;

const destino =
document.getElementById(
"destino"
).value;

const corrida =
await calcularCorrida(
origem,
destino
);

if(!corrida){
return;
}

document.getElementById(
"corridaStatus"
).innerHTML = `

🚗 Distância:
${corrida.km} KM

<br><br>

💰 Valor:
R$ ${corrida.valor}

<br><br>

🔎 Procurando motorista...

`;

const res =
await fetch(
API+"/nova_corrida",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

passageiro_id:user.id,

origem,

destino,

valor:corrida.valor

})

}

);

const data =
await res.json();

console.log(
"CORRIDA",
data
);

corridaId =
data.corrida_id;

}catch(err){

console.log(err);

alert(
"Erro chamar corrida"
);

}

},

(error)=>{

alert(
"Ative a localização do iPhone"
);

},

{

enableHighAccuracy:true,
timeout:10000,
maximumAge:0

}

);

}

/* CANCELAR */

async function cancelarCorrida(){

if(!corridaId){

alert(
"Nenhuma corrida ativa"
);

return;

}

try{

await fetch(
API+"/cancelar_corrida/"+corridaId,
{
method:"POST"
}
);

corridaId = null;

document.getElementById(
"corridaStatus"
).innerHTML = `

<div style="
background:#111827;
padding:20px;
border-radius:15px;
">

❌ Corrida cancelada

</div>

`;

document.getElementById(
"mapaMotorista"
).innerHTML = "";

}catch(err){

console.log(err);

alert(
"Erro cancelar corrida"
);

}

}

/* ACEITA */

socket.on(
"corrida_aceita",
(data)=>{

motoristaAtual =
data.motorista_id;

motoristaInfo =
data;

document.getElementById(
"corridaStatus"
).innerHTML = `

<div style="
background:#111827;
padding:20px;
border-radius:15px;
">

<h2 style="
color:#22c55e;
">

🚗 Corrida aceita

</h2>

<p>
👨 ${data.motorista_nome}
</p>

<p>
🚘 ${data.carro}
</p>

<p>
📍 ${data.placa}
</p>

</div>

`;

document.getElementById(
"mapaMotorista"
).innerHTML = `

<div style="
background:#111827;
padding:20px;
border-radius:15px;
text-align:center;
">

🗺️ Aguardando motorista...

</div>

`;

}
);

/* GPS MOTORISTA */

socket.on(
"localizacao_motorista",
(data)=>{

if(
data.motorista_id !=
motoristaAtual
){
return;
}

document.getElementById(
"mapaMotorista"
).innerHTML = `

<iframe

src="https://maps.google.com/maps?q=${data.latitude},${data.longitude}&z=15&output=embed"

>

</iframe>

`;

}
);

/* CANCELAMENTO */

socket.on(
"corrida_cancelada",
(data)=>{

document.getElementById(
"corridaStatus"
).innerHTML = `

<div style="
background:#111827;
padding:20px;
border-radius:15px;
">

❌ Corrida cancelada

</div>

`;

document.getElementById(
"mapaMotorista"
).innerHTML = "";

corridaId = null;

}
);

</script>

</body>
</html>
