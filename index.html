<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passageiro - Rota Brasil</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        header {
            padding: 20px;
            background: #111827;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            max-width: 500px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: #1f2937;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            border: none;
            border-radius: 10px;
            background: #111827;
            color: white;
            outline: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
            font-size: 16px;
        }

        button:hover {
            transform: scale(1.02);
        }

        .primary { background: #2563eb; color: white; }
        .success { background: #10b981; color: white; }
        .danger { background: #ef4444; color: white; }

        .status {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }

        .motorista {
            background: #111827;
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
            border: 1px solid #374151;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            background: #22c55e;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        #mapa {
            height: 350px;
            border-radius: 15px;
            margin-top: 15px;
            z-index: 1;
        }
    </style>
</head>

<body>

    <header>
        🚗 Rota Brasil - Passageiro
    </header>

    <div class="container">
        <div class="card" id="loginCard">
            <h3>Login / Cadastro</h3>
            <input id="nome" placeholder="Nome (Apenas para cadastro)">
            <input id="email" placeholder="Email" type="email">
            <input id="senha" type="password" placeholder="Senha">
            <input id="telefone" placeholder="Telefone">
            
            <button class="primary" onclick="register()">Criar conta</button>
            <button class="success" onclick="login()">Entrar</button>
            <p id="loginStatus" class="status"></p>
        </div>

        <div class="card" id="dashboard" style="display:none">
            <h3>Para onde vamos?</h3>
            <input id="destino" placeholder="Digite o endereço de destino">
            
            <button class="primary" onclick="chamarCorrida()">Procurar motorista</button>
            <button class="danger" onclick="cancelarCorrida()">Cancelar corrida</button>
            
            <hr style="border-color: #374151; margin: 20px 0;">
            
            <div class="badge">Motoristas online</div>
            <div id="motoristasArea">Buscando motoristas...</div>
            
            <p id="corridaStatus" class="status"></p>
            <div id="mapa"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // ✅ FALTA DEFINIR A API AQUI - ERA O PRINCIPAL ERRO
        const API = "https://rotabrasil-v1cf.onrender.com";
        
        const socket = io(API, {
            transports: ["websocket"],
            upgrade: false
        });
        

        socket.on("connect", () => {
            console.log("SOCKET CONECTADO", socket.id);
        });  

        let user = null;
        let token = null;
        let corridaId = null;
        let motoristaAtual = null;
        let linhaAtual = null;
        let map = null;
        let marcadorMotorista = null; // Evita duplicação de ícones no mapa

        /* =========================
           INICIALIZAR MAPA
        ========================= */
        function iniciarMapa() {
            if (map) return;

            // Configura o mapa inicialmente em São Paulo, mas se ajusta à rota depois
            map = L.map('mapa').setView([-23.55052, -46.633308], 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: 'OpenStreetMap'
            }).addTo(map);

            setTimeout(() => {
                map.invalidateSize();
            }, 500);
        }

        /* =========================
           DESENHAR ROTA NO MAPA
        ========================= */
        async function desenharRota(lat1, lon1, lat2, lon2) {
            try {
                const url = `https://router.project-osrm.org/route/v1/driving/${lon1},${lat1};${lon2},${lat2}?overview=full&geometries=geojson`;
                const res = await fetch(url);
                const data = await res.json();

                if (!data.routes || data.routes.length === 0) return;

                const coords = data.routes[0].geometry.coordinates;
                const pontos = coords.map(c => [c[1], c[0]]);

                if (linhaAtual) {
                    map.removeLayer(linhaAtual);
                }

                linhaAtual = L.polyline(pontos, { color: '#2563eb', weight: 5 }).addTo(map);
                map.fitBounds(linhaAtual.getBounds());
            } catch (err) {
                console.error("Erro ao desenhar rota:", err);
            }
        }

        /* =========================
           AUTO LOGIN
        ========================= */
        const tokenSalvo = localStorage.getItem("token");
        const userSalvo = localStorage.getItem("user");

        if (tokenSalvo && userSalvo) {
            token = tokenSalvo;
            user = JSON.parse(userSalvo);
            
            window.addEventListener("load", () => {
                 liberarPainel();
            });
        }

        function liberarPainel() {
            document.getElementById("loginCard").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            iniciarMapa(); 
            buscarMotoristas();
        }

        /* =========================
           CADASTRO (REGISTER)
        ========================= */
        async function register() {
            try {
                const res = await fetch(`${API}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        nome: document.getElementById("nome").value,
                        email: document.getElementById("email").value,
                        senha: document.getElementById("senha").value,
                        telefone: document.getElementById("telefone").value,
                        tipo: "passageiro"
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    document.getElementById("loginStatus").innerHTML = "Conta criada! Entrando...";
                    // Faz o login automático após cadastrar
                    login();
                } else {
                    alert(data.erro || "Erro ao registrar");
                }
            } catch (err) {
                console.error(err);
            }
        }

        /* =========================
           LOGIN
        ========================= */
        async function login() {
            try {
                const res = await fetch(`${API}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: document.getElementById("email").value,
                        senha: document.getElementById("senha").value
                    })
                });

                const data = await res.json();

                if (res.ok && data.token) {
                    token = data.token;
                    user = data.user;

                    localStorage.setItem("token", token);
                    localStorage.setItem("user", JSON.stringify(user));

                    liberarPainel();
                } else {
                    alert(data.erro || "Credenciais inválidas");
                }
            } catch (err) {
                console.error(err);
                alert("Erro ao conectar com o servidor.");
            }
        }

        /* =========================
           BUSCAR MOTORISTAS ONLINE
        ========================= */
        async function buscarMotoristas() {
            try {
                const res = await fetch(`${API}/motoristas_online`);
                const data = await res.json();
                const area = document.getElementById("motoristasArea");
                area.innerHTML = "";

                if (data.length === 0) {
                    area.innerHTML = "Nenhum motorista disponível no momento";
                    return;
                }

                data.forEach((m) => {
                    area.innerHTML += `
                        <div class="motorista">
                            🚗 <b>${m.nome}</b> <br>
                            <small>${m.carro} • Placa: ${m.placa}</small>
                        </div>
                    `;
                });
            } catch (err) {
                console.error(err);
            }
        }

        /* =========================
           CALCULAR ROTA E VALORES
        ========================= */
        async function calcularCorrida(origem, destino) {
            // Chave pública genérica do OpenRouteService (pode ser substituída se expirar)
            const API_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNzdmNzYyMzU3YzQxZThhODJjMDNlMmJlOTJlMTNiIiwiaCI6Im11cm11cjY0In0=";

            async function buscarCoordenadas(local) {
                if (local.includes(",")) {
                    const partes = local.split(",");
                    return [parseFloat(partes[1]), parseFloat(partes[0])];
                }
                const url = `https://api.openrouteservice.org/geocode/search?api_key=${API_KEY}&text=${encodeURIComponent(local)}&boundary.country=BR`;
                const res = await fetch(url);
                const data = await res.json();
                return data.features[0].geometry.coordinates;
            }

            try {
                const origemCoords = await buscarCoordenadas(origem);
                const destinoCoords = await buscarCoordenadas(destino);

                await desenharRota(origemCoords[1], origemCoords[0], destinoCoords[1], destinoCoords[0]);

                const rotaUrl = `https://api.openrouteservice.org/v2/directions/driving-car?api_key=${API_KEY}&start=${origemCoords[0]},${origemCoords[1]}&end=${destinoCoords[0]},${destinoCoords[1]}`;
                const rotaRes = await fetch(rotaUrl);
                const rotaData = await rotaRes.json();

                const metros = rotaData.features[0].properties.summary.distance;
                const km = metros / 1000;
                const valor = km * 2.5; // Definido R$2,50 por KM rodado

                return {
                    km: km.toFixed(1),
                    valor: valor.toFixed(2)
                };
            } catch (err) {
                console.error(err);
                alert("Erro ao calcular a rota geográfica.");
                return null;
            }
        }

        /* =========================
           SOLICITAR/CHAMAR CORRIDA
        ========================= */
        async function chamarCorrida() {
            if (corridaId) {
                alert("Você já tem uma solicitação em andamento.");
                return;
            }

            if (!navigator.geolocation) {
                alert("O seu navegador não possui suporte a localização GPS.");
                return;
            }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const origem = `${pos.coords.latitude},${pos.coords.longitude}`;
                    const destino = document.getElementById("destino").value;

                    if (!destino) {
                        alert("Por favor, digite um destino.");
                        return;
                    }

                    document.getElementById("corridaStatus").innerHTML = "🔄 Calculando trajeto e tarifas...";

                    const corrida = await calcularCorrida(origem, destino);
                    if (!corrida) return;

                    document.getElementById("corridaStatus").innerHTML = `
                        📏 <b>Distância:</b> ${corrida.km} KM <br>
                        💰 <b>Valor estimado:</b> R$ ${corrida.valor} <br><br>
                        🔍 <span style="color:#eab308">Buscando motoristas próximos...</span>
                    `;

                    const res = await fetch(`${API}/nova_corrida`, {
                        method: "POST",
                        headers: { 
                            "Content-Type": "application/json",
                            "Authorization": "Bearer " + token
                        },
                        body: JSON.stringify({
                            passageiro_id: user.id, // ✅ Adicionei o ID do passageiro
                            origem,
                            destino,
                            valor: corrida.valor
                        })
                    });

                    const data = await res.json();
                    corridaId = data.corrida_id;
                    
                    // ✅ FALTA EMITIR O EVENTO PARA O SOCKET - ERA OUTRO ERRO
                    socket.emit('nova_corrida', {
                        corrida_id: corridaId,
                        passageiro_id: user.id,
                        passageiro_nome: user.nome,
                        origem: origem,
                        destino: destino,
                        valor: corrida.valor
                    });

                } catch (err) {
                    console.error(err);
                    alert("Falha ao registrar pedido de corrida.");
                }
            }, () => {
                alert("Permissão de localização negada. Ative seu GPS.");
            }, { enableHighAccuracy: true });
        }

        /* =========================
           CANCELAR CORRIDA ACTIVE
        ========================= */
        async function cancelarCorrida() {
            if (!corridaId) {
                alert("Não há nenhuma corrida pendente ou ativa.");
                return;
            }

            try {
                const res = await fetch(`${API}/cancelar_corrida/${corridaId}`, {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + token }
                });

                if (res.ok) {
                    document.getElementById("corridaStatus").innerHTML = `<span style="color:#ef4444">❌ Corrida cancelada.</span>`;
                    
                    if (linhaAtual) map.removeLayer(linhaAtual);
                    if (marcadorMotorista) map.removeLayer(marcadorMotorista);
                    
                    corridaId = null;
                    motoristaAtual = null;
                }
            } catch (err) {
                console.error(err);
            }
        }

        /* =========================
           WS: ESCUTAR ACEITE DO MOTORISTA
        ========================= */
        socket.on("corrida_aceita", (data) => {
            if (String(data.corrida_id) !== String(corridaId)) return;

            motoristaAtual = data.motorista_id;

            document.getElementById("corridaStatus").innerHTML = `
                <div class="motorista" style="border-color: #22c55e;">
                    <h3 style="color:#22c55e; margin-top:0;">🚗 Seu motorista está a caminho!</h3>
                    <p>👨 <b>Nome:</b> ${data.motorista_nome}</p>
                    <p>🚘 <b>Veículo:</b> ${data.carro}</p>
                    <p>📍 <b>Placa:</b> ${data.placa}</p>
                </div>
            `;
        });

        /* =========================
           WS: RASTREAR GPS DO MOTORISTA NO MAPA
        ========================= */
        socket.on("localizacao_motorista", (data) => {
            if (!motoristaAtual || data.motorista_id != motoristaAtual) return;

            // Se o ícone do motorista já existia, só movemos de lugar (Evita encher o mapa de clones)
            if (marcadorMotorista) {
                marcadorMotorista.setLatLng([data.latitude, data.longitude]);
            } else {
                marcadorMotorista = L.marker([data.latitude, data.longitude]).addTo(map)
                    .bindPopup("Seu motorista")
                    .openPopup();
            }

            map.setView([data.latitude, data.longitude], 16);
        });

        /* =========================
           WS: ESCUTAR SE O MOTORISTA CANCELAR
        ========================= */
        socket.on("corrida_cancelada", (data) => {
            if (data.corrida_id != corridaId) return;

            document.getElementById("corridaStatus").innerHTML = `<span style="color:#ef4444">❌ O motorista ou a corrida foi cancelada.</span>`;
            
            if (linhaAtual) map.removeLayer(linhaAtual);
            if (marcadorMotorista) map.removeLayer(marcadorMotorista);
            
            corridaId = null;
            motoristaAtual = null;
        });
    </script>
</body>
</html>
