<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rota Brasil</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url('assets/fundo.jpg');
background-size:cover;
background-position:center;
color:white;
}

header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
background:#111827;
}

.logo{
font-size:28px;
font-weight:bold;
}

.container{
width:100%;
min-height:90vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.card{
width:100%;
max-width:450px;
background:rgba(31,41,55,0.9);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
}

h1{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#374151;
color:white;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#10b981;
color:white;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}

.register{
background:#2563eb;
}

.cancel{
background:#ef4444;
}

.dashboard{
display:none;
}

.motorista{
background:#374151;
padding:15px;
border-radius:12px;
margin-top:10px;
}

.status{
text-align:center;
margin-top:15px;
font-weight:bold;
}

.mapa{
width:100%;
height:250px;
background:#1f2937;
border-radius:15px;
margin-top:20px;
display:flex;
align-items:center;
justify-content:center;
}

</style>

</head>
<body>

<header>
<div class="logo">🚗 Rota Brasil</div>
</header>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginCard">

<h1>Passageiro</h1>

<input type="text" id="nome" placeholder="Seu nome">
<input type="email" id="email" placeholder="Seu email">
<input type="text" id="telefone" placeholder="Telefone">
<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button class="register" onclick="register()">Criar Conta</button>

<p class="status" id="loginStatus"></p>

</div>

<!-- DASHBOARD -->
<div class="card dashboard" id="dashboard">

<h1>Chamar Corrida</h1>

<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">

<button onclick="buscarMotoristas()">Procurar Motoristas</button>
<button onclick="chamarCorrida()">Chamar Corrida</button>
<button class="cancel" onclick="cancelarCorrida()">Cancelar Corrida</button>

<div id="motoristasArea">Nenhum motorista online</div>

<div class="mapa">MAPA TEMPO REAL</div>

<p class="status" id="corridaStatus"></p>

</div>

</div>

<script>

const API = "https://rotabrasil-v1cf.onrender.com";
const socket = io(API);
let user = null;
let corridaId = null;

// REGISTER
async function register(){

const nome = document.getElementById("nome").value;
const email = document.getElementById("email").value;
const telefone = document.getElementById("telefone").value;
const senha = document.getElementById("senha").value;
const status = document.getElementById("loginStatus");

try{

const response = await fetch(API+"/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({nome,email,telefone,senha,tipo:"passageiro"})
});

const data = await response.json();
status.innerHTML = "Conta criada com sucesso";

}catch(e){
status.innerHTML = "Erro cadastro";
}
}

// LOGIN
async function login(){

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;
const status = document.getElementById("loginStatus");

try{

const response = await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,senha})
});

const data = await response.json();

if(data.token){
user = data.user;
localStorage.setItem("user",JSON.stringify(user));

document.getElementById("loginCard").style.display="none";
document.getElementById("dashboard").style.display="block";

buscarMotoristas();

}else{
status.innerHTML = data.erro;
}

}catch(e){
status.innerHTML="Erro servidor";
}
}

// MOTORISTAS
async function buscarMotoristas(){

const area = document.getElementById("motoristasArea");
area.innerHTML="Buscando...";

const res = await fetch(API+"/motoristas_online");
const data = await res.json();

area.innerHTML="";

if(data.length===0){
area.innerHTML="Nenhum motorista online";
return;
}

data.forEach(m=>{
area.innerHTML+=`<div class='motorista'>🚗 ${m.nome}<br>${m.carro||''}</div>`;
});
}

// CHAMAR CORRIDA
async function chamarCorrida(){

const origem = document.getElementById("origem").value;
const destino = document.getElementById("destino").value;
const status = document.getElementById("corridaStatus");

try{

const res = await fetch(API+"/nova_corrida",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({passageiro_id:user.id,origem,destino,valor:25})
});

const data = await res.json();

corridaId = data.corrida_id || null;

status.innerHTML="🚗 Procurando motorista...";

}catch(e){
status.innerHTML="Erro ao chamar corrida";
}
}

// CANCELAR CORRIDA
async function cancelarCorrida(){

if(!corridaId){
alert("Nenhuma corrida ativa");
return;
}

await fetch(API+"/cancelar_corrida/"+corridaId,{method:"POST"});

document.getElementById("corridaStatus").innerHTML="❌ Corrida cancelada";
corridaId=null;
}

// SOCKET
socket.on("corrida_aceita",(data)=>{

corridaId = data.corrida_id;

document.getElementById("corridaStatus").innerHTML=
"🚗 " + (data.motorista_nome || "Motorista") + " aceitou sua corrida";

});

</script>

</body>
</html>
