<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Passageiro</title>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background-image:

            linear-gradient(
                rgba(0,0,0,0.7),
                rgba(0,0,0,0.7)
            ),

            url("assets/fundo.jpg");

            background-size:cover;

            background-position:center;

            background-repeat:no-repeat;

            background-attachment:fixed;

            color:white;
        }

        .container{

            width:100%;
            min-height:100vh;

            display:flex;

            align-items:center;

            justify-content:center;

            padding:20px;
        }

        .card{

            width:100%;
            max-width:420px;

            background:rgba(31,41,55,0.90);

            backdrop-filter:blur(10px);

            padding:30px;

            border-radius:20px;

            box-shadow:0 0 25px rgba(0,0,0,0.6);
        }

        .logo{

            width:120px;

            display:block;

            margin:0 auto 20px;
        }

        h1{

            text-align:center;

            margin-bottom:25px;
        }

        input{

            width:100%;

            padding:15px;

            margin-bottom:15px;

            border:none;

            border-radius:10px;

            background:#374151;

            color:white;

            font-size:16px;
        }

        input::placeholder{

            color:#d1d5db;
        }

        button{

            width:100%;

            padding:15px;

            border:none;

            border-radius:10px;

            background:#10b981;

            color:white;

            font-size:16px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;

            margin-bottom:10px;
        }

        button:hover{

            opacity:0.9;

            transform:scale(1.02);
        }

        .register{

            background:#2563eb;
        }

        .status{

            margin-top:20px;

            text-align:center;

            color:#d1d5db;
        }

        .dashboard{

            display:none;
        }

        .motoristas{

            background:#1f2937;

            padding:15px;

            border-radius:15px;

            margin-top:20px;
        }

        .motorista{

            padding:10px;

            border-bottom:1px solid #374151;
        }

    </style>

</head>

<body>

    <div class="container">

        <!-- LOGIN -->

        <div class="card" id="loginCard">

            <img
                src="assets/logo.png"
                class="logo"
            >

            <h1>Passageiro</h1>

            <input
                type="email"
                id="email"
                placeholder="Email"
            >

            <input
                type="password"
                id="senha"
                placeholder="Senha"
            >

            <button onclick="login()">
                Entrar
            </button>

            <button
                class="register"
                onclick="register()"
            >
                Criar Conta
            </button>

            <p
                class="status"
                id="loginStatus"
            ></p>

        </div>

        <!-- DASHBOARD -->

        <div
            class="card dashboard"
            id="dashboard"
        >

            <img
                src="assets/logo.png"
                class="logo"
            >

            <h1>Chamar Corrida</h1>

            <input
                type="text"
                id="origem"
                placeholder="Origem"
            >

            <input
                type="text"
                id="destino"
                placeholder="Destino"
            >

            <button onclick="verMotoristas()">
                Ver Motoristas
            </button>

            <div
                class="motoristas"
                id="motoristasArea"
            ></div>

            <button onclick="chamarCorrida()">
                Chamar Corrida
            </button>

            <p
                class="status"
                id="status"
            ></p>

        </div>

    </div>

    <script>

        const API =
        "https://rotabrasil-v1cf.onrender.com"

        const socket = io(API)

        let user = null

        // =====================================
        // REGISTER
        // =====================================

        async function register(){

            const email =
            document.getElementById(
                "email"
            ).value

            const senha =
            document.getElementById(
                "senha"
            ).value

            const status =
            document.getElementById(
                "loginStatus"
            )

            try{

                const response = await fetch(

                    API + "/register",

                    {

                        method:"POST",

                        headers:{
                            "Content-Type":
                            "application/json"
                        },

                        body: JSON.stringify({

                            nome:"Passageiro",

                            email,

                            senha,

                            telefone:"99999",

                            tipo:"passageiro"
                        })
                    }
                )

                const text =
                await response.text()

                console.log(text)

                status.innerHTML =
                "Conta criada com sucesso"

            }catch(error){

                console.log(error)

                status.innerHTML =
                "Erro cadastro"
            }
        }

        // =====================================
        // LOGIN
        // =====================================

        async function login(){

            const email =
            document.getElementById(
                "email"
            ).value

            const senha =
            document.getElementById(
                "senha"
            ).value

            const status =
            document.getElementById(
                "loginStatus"
            )

            try{

                const response = await fetch(

                    API + "/login",

                    {

                        method:"POST",

                        headers:{
                            "Content-Type":
                            "application/json"
                        },

                        body: JSON.stringify({

                            email,
                            senha
                        })
                    }
                )

                const data =
                await response.json()

                console.log(data)

                if(data.token){

                    user = data.user

                    localStorage.setItem(
                        "token",
                        data.token
                    )

                    localStorage.setItem(
                        "user",
                        JSON.stringify(data.user)
                    )

                    document.getElementById(
                        "loginCard"
                    ).style.display = "none"

                    document.getElementById(
                        "dashboard"
                    ).style.display = "block"

                }else{

                    status.innerHTML =
                    data.erro || "Erro login"
                }

            }catch(error){

                console.log(error)

                status.innerHTML =
                "Erro servidor"
            }
        }

        // =====================================
        // VER MOTORISTAS
        // =====================================

        async function verMotoristas(){

            const area =
            document.getElementById(
                "motoristasArea"
            )

            area.innerHTML =
            "Buscando motoristas..."

            try{

                const response = await fetch(

                    API + "/motoristas_online"
                )

                const data =
                await response.json()

                console.log(data)

                area.innerHTML = ""

                if(data.length === 0){

                    area.innerHTML =
                    "Nenhum motorista online"

                    return
                }

                data.forEach((motorista)=>{

                    area.innerHTML += `

                        <div class="motorista">

                            🚗 ${motorista.nome}

                        </div>
                    `
                })

            }catch(error){

                console.log(error)

                area.innerHTML =
                "Erro ao buscar motoristas"
            }
        }

        // =====================================
        // CHAMAR CORRIDA
        // =====================================

        async function chamarCorrida(){

            const origem =
            document.getElementById(
                "origem"
            ).value

            const destino =
            document.getElementById(
                "destino"
            ).value

            const status =
            document.getElementById(
                "status"
            )

            try{

                const response = await fetch(

                    API + "/nova_corrida",

                    {

                        method:"POST",

                        headers:{
                            "Content-Type":
                            "application/json"
                        },

                        body: JSON.stringify({

                            passageiro_id:user.id,

                            origem,

                            destino,

                            valor:25
                        })
                    }
                )

                const data =
                await response.json()

                console.log(data)

                status.innerHTML =
                "Corrida chamada com sucesso"

            }catch(error){

                console.log(error)

                status.innerHTML =
                "Erro ao chamar corrida"
            }
        }

    </script>

</body>

</html>
